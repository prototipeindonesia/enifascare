<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hasil Analisis - e-NifasCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3dbda7;
            --accent: #f06292;
            --danger: #ff5252;
            --warning: #ffa726;
            --bg-safe: linear-gradient(135deg, #f0fbf9 0%, #fff 100%);
            --bg-danger: linear-gradient(135deg, #fff5f5 0%, #fff 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            transition: background 0.5s ease;
        }

        .app-container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 25px;
            text-align: center;
        }

        /* Result Icon Section */
        .result-icon-wrapper {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .icon-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            animation: popIn 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        /* Card Info */
        .status-card {
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            margin-bottom: 20px;
        }

        h2 { margin-bottom: 10px; font-weight: 700; }
        p { font-size: 0.95rem; color: #666; line-height: 1.5; }

        /* Action Buttons */
        .btn-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-sos { background: var(--danger); color: white; box-shadow: 0 8px 20px rgba(255, 82, 82, 0.3); }
        .btn-home { background: var(--primary); color: white; box-shadow: 0 8px 20px rgba(61, 189, 167, 0.3); }
        .btn-secondary { background: #f5f5f5; color: #777; }

        /* Mode Styles */
        body.safe-mode { background: var(--bg-safe); }
        .safe-mode .icon-circle { background: #e0f2f1; color: var(--primary); }
        .safe-mode h2 { color: var(--primary); }

        body.danger-mode { background: var(--bg-danger); }
        .danger-mode .icon-circle { background: #ffebee; color: var(--danger); animation: pulseDanger 1.5s infinite; }
        .danger-mode h2 { color: var(--danger); }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pulseDanger {
            0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(255, 82, 82, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); }
        }
    </style>
</head>
<body class="safe-mode"> <div class="app-container">
        <div class="result-icon-wrapper">
            <div class="icon-circle" id="resultIcon">✅</div>
            <h2 id="resultTitle">Kondisi Aman</h2>
            <div class="status-card">
                <p id="resultDesc">Berdasarkan jawaban Anda, tidak ditemukan tanda bahaya nifas yang serius hari ini. Tetap jaga kesehatan dan konsumsi nutrisi bergizi.</p>
            </div>
        </div>

        <div class="btn-group" id="actionGroup">
            </div>
    </div>

    <script>
        // Mengambil parameter 'status' dari URL
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');

        const body = document.body;
        const icon = document.getElementById('resultIcon');
        const title = document.getElementById('resultTitle');
        const desc = document.getElementById('resultDesc');
        const actionGroup = document.getElementById('actionGroup');

        if (status === 'danger') {
            // MODE BAHAYA (Berdasarkan Tanda Bahaya Nifas di Dokumen)
            body.className = 'danger-mode';
            icon.innerText = '🚨';
            title.innerText = 'Tanda Bahaya!';
            desc.innerHTML = "Ditemukan indikasi <b>Tanda Bahaya Nifas</b>. Segera hubungi tenaga kesehatan atau menuju ke fasilitas kesehatan terdekat untuk pemeriksaan.";
            
            actionGroup.innerHTML = `
                <a href="tel:119" class="btn btn-sos">📞 HUBUNGI DARURAT (119)</a>
                <a href="https://wa.me/6282233331338" class="btn btn-home" style="background: #25d366;">💬 CHAT BIDAN/NAKES</a>
                <a href="materi_edukasi_nifas.html" class="btn btn-secondary">Kembali ke Edukasi</a>
            `;
        } else {
            // MODE AMAN
            body.className = 'safe-mode';
            icon.innerText = '✅';
            title.innerText = 'Ibu Sehat!';
            desc.innerText = "Kondisi Ibu terpantau normal. Lanjutkan pemulihan dengan istirahat cukup dan tetap pantau gejala setiap hari.";
            
            actionGroup.innerHTML = `
                <a href="materi_edukasi_nifas.html" class="btn btn-home">Lanjut Baca Materi</a>
                <a href="index.html" class="btn btn-secondary">Selesai Untuk Hari Ini</a>
            `;
        }
    </script>
</body>
</html>
