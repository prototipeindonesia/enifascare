<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pengertian Masa Nifas - e-NifasCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3dbda7;
            --bg-soft: #f5fffd;
            --text-dark: #444;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; background-color: var(--bg-soft); color: var(--text-dark); line-height: 1.6; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .back-nav { text-decoration: none; color: var(--primary); font-weight: 700; display: block; margin-bottom: 20px; }
        
        .content-card { background: var(--white); border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .icon-header { font-size: 3rem; margin-bottom: 15px; display: block; }
        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 20px; }
        
        .definition-box { text-align: justify; font-size: 1rem; color: #555; }
        .highlight { color: var(--primary); font-weight: 700; }
        
        .duration-badge { 
            display: inline-block; 
            margin-top: 25px; 
            background: #e0f2f1; 
            color: var(--primary); 
            padding: 10px 20px; 
            border-radius: 50px; 
            font-weight: 700; 
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="materi_edukasi_nifas.html" class="back-nav">← Kembali</a>
        
        <div class="content-card">
            <span class="icon-header">ℹ️</span>
            <h1>Pengertian Masa Nifas</h1>
            
            <div class="definition-box">
                <p>Masa nifas adalah <span class="highlight">masa pemulihan ibu setelah melahirkan</span> yang berlangsung selama sekitar <span class="highlight">6 minggu (42 hari)</span>.</p>
                <br>
                <p>Pada masa ini, tubuh ibu secara alami akan kembali pulih dan menyesuaikan diri kembali setelah proses persalinan.</p>
            </div>

            <div class="duration-badge">
                📅 Total Pemulihan: 42 Hari
            </div>
        </div>
    </div>
</body>
</html>
